name: Build Release APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      # 强行锁定使用稳定兼容的 Gradle 8.4 版本
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: Generate Keystore
      run: |
        keytool -genkey -v -keystore release.jks -keyalg RSA -keysize 2048 -validity 10000 -alias lighty -dname "CN=Lighty" -storepass 123456 -keypass 123456
        mv release.jks app/

    - name: Build with Gradle
      run: gradle assembleRelease

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Lighty-NoBrightness-Release
        path: app/build/outputs/apk/release/app-release.apk