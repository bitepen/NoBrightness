name: Build Release APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Generate Keystore
      # 在云端临时生成一个数字签名文件
      run: |
        keytool -genkey -v -keystore release.jks -keyalg RSA -keysize 2048 -validity 10000 -alias lighty -dname "CN=Lighty" -storepass 123456 -keypass 123456
        mv release.jks app/

    - name: Build with Gradle
      # 指令改为编译 Release 包
      run: gradle assembleRelease

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Lighty-NoBrightness-Release
        path: app/build/outputs/apk/release/app-release.apk